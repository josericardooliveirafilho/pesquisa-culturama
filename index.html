<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <form action="" method="get">
            <fieldset>
                <legend>Dados Pessoais</legend>

                <label for="userName">Nome</label>
                <input type="text" name="userName" required><br><br>

                <label for="userAge">Idade</label>
                <input type="number" name="userAge" min="12" max="100" required><br><br>

                <label for="useBirthDate">Data de Nascimento</label>
                <input type="date" name="useBirthDate"><br><br>

                <label for="userEmail">Email</label>
                <input type="email" name="userEmail" required><br><br>

                <label for="userPhoneNumber">Telefone</label>
                <input type="tel" name="userPhoneNumber" pattern="[0-9]{11}" placeholder="DDD+Número (Só os Números)"><br><br>

                <label for="userImage">Upload de Foto</label>
                <input type="file" accept="image/*" name="userImage">
            </fieldset>

            <fieldset>
                <legend>Perfil</legend>

                <p>Gênero</p>
                
                <input type="radio" name="userGender" value="feminino">
                <label for="userGender">Feminino</label>

                <input type="radio" name="userGender" value="masculino">
                <label for="userGender">Masculino</label>

                <input type="radio" name="userGender" value="nao-informado">
                <label for="userGender">Prefiro não informar</label>
            </fieldset><br>

            <button type="submit">Enviar</button>
        </form>
    </section>
</body>
</html>
