<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="culturama-favico.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans&display=swap" rel="stylesheet">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <header>
        <img src="img/logo-culturama.png" alt="Logo Culturama">
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <form action="" method="get">
            <fieldset>
                <legend>Dados Pessoais</legend>

                <label for="name">Nome</label>
                <input id="name" type="text" name="userName" required><br><br>

                <label for="age">Idade</label>
                <input id="age" type="number" name="userAge" min="12" max="100" required><br><br>

                <label for="birthDate">Data de Nascimento</label>
                <input id="birthDate" type="date" name="userBirthDate"><br><br>

                <label for="email">Email</label>
                <input id="email" type="email" name="userEmail" required><br><br>

                <label for="phone">Telefone</label>
                <input id="phone" type="tel" name="userPhoneNumber" pattern="[0-9]{11}" placeholder="DDD+Número (Só os Números)"><br><br>

                <label for="image">Upload de Foto</label>
                <input id="image" type="file" accept="image/*" name="userImage">
            </fieldset><br>

            <fieldset>
                <legend>Perfil</legend>

                <p>Gênero</p>

                <input id="fem" type="radio" name="userGender" value="feminino">
                <label for="fem">Feminino</label>

                <input id="masc" type="radio" name="userGender" value="masculino">
                <label for="masc">Masculino</label>

                <input id="notInformed" type="radio" name="userGender" value="nao-informado">
                <label for="notInformed">Prefiro não informar</label><br><br>

                <label for="maritalStatus">Estado Civil</label>

                <select id="maritalStatus" name="userMaritalStatus">
                    <option value="nao-informado">Selecione...</option>
                    <option value="solteiro">Solteiro</option>
                    <option value="casado">Casado</option>
                    <option value="divorciado">Divorciado</option>
                    <option value="viuvo">Viúvo</option>
                    <option value="uniao-estavel">União Estável</option>
                </select><br><br>

                <label for="city">Cidade</label>
                <input id="city" type="text" name="userCity">

                <label for="state">Estado (UF)</label>

                <select id="state" name="userSate" required>
                    <option value="nao-informado">Selecione...</option>
                    <option value="AC">Acre-AC</option>
                    <option value="AL">Alagoas-AL</option>
                    <option value="AP">Amapá-AP</option>
                    <option value="AM">Amazonas-AM</option>
                    <option value="BA">Bahia-BA</option>
                    <option value="CE">Ceará-CE</option>
                    <option value="DF">Distrito Federal-DF</option>
                    <option value="ES">Espirito Santo-ES</option>
                    <option value="GO">Goiás-GO</option>
                    <option value="MA">Maranhão-MA</option>
                    <option value="MS">Mato Grosso do Sul-MS</option>
                    <option value="MT">Mato Grosso-MT</option>
                    <option value="MG">Minas Gerais-MG</option>
                    <option value="PA">Pará-PA</option>
                    <option value="PB">Paraíba-PB</option>
                    <option value="PR">Paraná-PR</option>
                    <option value="PE">Pernambuco-PE</option>
                    <option value="PI">Piauí-PI</option>
                    <option value="RJ">Rio de Janeiro-RJ</option>
                    <option value="RN">Rio Grande do Norte-RN</option>
                    <option value="RS">Rio Grande do Sul-RS</option>
                    <option value="RO">Rondônia-RO</option>
                    <option value="RR">Roraima-RR</option>
                    <option value="SC">Santa Catarina-SC</option>
                    <option value="SP">São Paulo-SP</option>
                    <option value="SE">Sergipe-SE</option>
                    <option value="TO">Tocantins-TO</option>
                </select>
            </fieldset><br>

            <fieldset>
                <legend>Hábitos</legend>

                <p>Redes Sociais</p>

                <input id="face" type="checkbox" name="userSocial" value="facebook">
                <label for="face">Facebook</label><br>

                <input id="insta" type="checkbox" name="userSocial" value="instagram">
                <label for="insta">Instagram</label><br>

                <input id="threads" type="checkbox" name="userSocial" value="threads">
                <label for="threads">Threads</label><br>

                <input id="twitter" type="checkbox" name="userSocial" value="x">
                <label for="twitter">X</label><br>

                <input id="link" type="checkbox" name="userSocial" value="linkedin">
                <label for="link">LinkedIn</label><br><br>

                <label for="musicStyle">Estilo Musical:</label>
                <input type="text" name="userMusicStyle" id="musicStyle" list="styleTypes">
                <datalist id="styleTypes">
                    <option value="Rock">
                    <option value="Pop">
                    <option value="Samba">
                    <option value="Sertanejo">
                </datalist><br><br>

                <label for="favoriteColor">Cor Favorita</label>
                <input type="color" name="userFavoriteColor" id="favoriteColor">
            </fieldset><br>

            <fieldset>
                <legend>Opinião</legend>

                <p>O quê você acha da qualidade do nosso serviço?</p>

                <input id="otima" type="radio" name="userSatisfaction" value="otima">
                <label for="otima">Ótima</label><br>

                <input id="boa" type="radio" name="userSatisfaction" value="boa">
                <label for="boa">Boa</label><br>

                <input id="regular" type="radio" name="userSatisfaction" value="regular">
                <label for="regular">Regular</label><br>

                <input id="ruim" type="radio" name="userSatisfaction" value="ruim">
                <label for="ruim">Ruim</label><br><br>

                <label for="comment">Comentário:</label>
                <textarea name="userComment" id="comment" placeholder="Digite aqui sua opinião..."></textarea>
            </fieldset><br>

            <fieldset>
                <legend>Confirmações</legend>

                <input type="checkbox" name="userLgpd" id="userLgpdTerm" value="accepted" required>
                <label for="userLgpdTerm">Eu aceito participar da Pesquisa</label><br>

                <input type="checkbox" name="userGetResult" id="getResult" value="accepted">
                <label for="getResult">Desejo receber o resultado por e-mail</label>
            </fieldset><br>

            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </form>
    </section>
</body>
</html>
